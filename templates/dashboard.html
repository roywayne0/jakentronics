<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .card {
            background: #fafafa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        img {
            width: 100%;
            border-radius: 6px;
        }

        button {
            margin-top: 5px;
            padding: 5px 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .upload-box {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Admin Dashboard</h1>
<a href="/logout">Logout</a>

<!-- SERVICES -->
<div class="section">
    <h2>Services</h2>

    <!-- Upload -->
    <div class="upload-box">
        <form action="/upload_service" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload Service</button>
        </form>
    </div>

    <!-- Images -->
    <div class="grid">
        {% for image in services %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/services/' + image) }}">
            <a href="/delete_service/{{ image }}">
                <button>Delete</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

<!-- PROJECTS -->
<div class="section">
    <h2>Projects</h2>

    <!-- Upload -->
    <div class="upload-box">
        <form action="/upload_project" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload Project</button>
        </form>
    </div>

    <!-- Images -->
    <div class="grid">
        {% for image in projects %}
        <div class="card">
            <img src="{{ url_for('static', filename='uploads/projects/' + image) }}">
            <a href="/delete_project/{{ image }}">
                <button>Delete</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
